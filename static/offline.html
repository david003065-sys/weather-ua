<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Живая погода — офлайн</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at 0 0, #1d4ed8 0, transparent 55%),
                radial-gradient(circle at 100% 100%, #f97316 0, transparent 55%),
                #020617;
            color: #e5e7eb;
        }
        .card {
            padding: 1.6rem 1.8rem;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.5);
            box-shadow: 0 22px 50px rgba(15, 23, 42, 1);
            max-width: 360px;
            text-align: center;
        }
        h1 {
            margin: 0 0 0.6rem;
            font-size: 1.3rem;
        }
        p {
            margin: 0;
            font-size: 0.9rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Нет подключения</h1>
        <p>Вы офлайн. Когда соединение восстановится, данные о погоде обновятся автоматически.</p>
    </div>
</body>
</html>
